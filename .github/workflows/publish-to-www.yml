name: Publish to jasonhartline.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Configure deploy key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.WWW_DEPLOY_KEY }}" > ~/.ssh/www_deploy_key
          chmod 600 ~/.ssh/www_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Check out website
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/www_deploy_key -o IdentitiesOnly=yes" \
            git clone --branch gh-pages git@github.com:jasonhartline/www.git www

      - name: Copy app into website
        run: |
          rm -rf www/cal-paper-bidder
          mkdir -p www/cal-paper-bidder
          cp app/index.html www/cal-paper-bidder/
          cp -R app/src www/cal-paper-bidder/
          cp -R app/examples www/cal-paper-bidder/
          touch www/cal-paper-bidder/.nojekyll

      - name: Commit and push website update
        run: |
          cd www
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cal-paper-bidder
          if git diff --cached --quiet; then
            echo "No website changes to publish."
            exit 0
          fi
          git commit -m "Publish cal-paper-bidder"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/www_deploy_key -o IdentitiesOnly=yes" \
            git push origin gh-pages
